<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <a href="index.html" class="text-2xl font-bold">
              Shop
            </a>

            <div class="flex items-center gap-6">
              <a href="shop.html">Shop</a>
              <a id="cartCount" href="cart.html" class="relative hover:opacity-70 transition-opacity" aria-label="Shopping Bag">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1,0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0,1-1.12-1.243l1.264-12A1.125 1.125 0 0,1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1,1-.75 0 .375.375 0 0,1 .75 0Zm7.5 0a.375.375 0 1,1-.75 0 .375.375 0 0,1 .75 0Z" />
                </svg>
                <span id="cartCount" class="absolute -top-6 -right-3 bg-red-500 text-white rounded-full text-xs px-1 py-1"> 0 </span>
              </a>
            </div>

        </div>
    </nav>


    <!-- Cart -->
    <section class="max-w-7xl mx-auto px-6 py-12">

        <h1 class="text-4xl font-bold mb-8">
          Shopping Cart
        </h1>


        <!-- Empty Cart -->
        <div id="emptyCart" class="hidden text-center py-20">

            <h2 class="text-2xl font-semibold mb-4">
                Your cart is empty.
            </h2>

            <a href="shop.html"
               class="bg-black text-white px-6 py-3 rounded-lg">
                Continue Shopping
            </a>

        </div>


        <!-- Cart Items -->
        <div id="cartItems" class="space-y-6">

        </div>


        <!-- Summary -->
        <div id="summary"
             class="mt-10 bg-white p-6 rounded-xl shadow">

            <div class="flex justify-between text-xl">

                <span>Total</span>

                <span id="cartTotal">$0.00</span>

            </div>

            <button id="checkoutBtn"
              class="w-full mt-6 bg-black text-white py-4 rounded-lg hover:bg-gray-800 transition">

              Proceed to Checkout

            </button>

        </div>

    </section>

    <script src="product.js"></script>
    <script src="cart.js"></script>

</body>
</html>
