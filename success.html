<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white max-w-lg w-full mx-4 p-10 rounded-2xl shadow-lg text-center">

        <!-- Success Icon -->
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-green-100 flex items-center justify-center">

            <svg class="w-10 h-10 text-green-600"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 viewBox="0 0 24 24">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M5 13l4 4L19 7"/>

            </svg>

        </div>

        <h1 class="text-3xl font-bold text-gray-900 mb-4">
            Order Placed Successfully!
        </h1>

        <p class="text-gray-600 mb-6">
            Thank you for your purchase. We've received your order and will begin processing it shortly.
        </p>

        <div class="bg-gray-100 rounded-lg p-4 mb-8">
            <p class="text-sm text-gray-500">Order Number</p>
            <p id="orderNumber" class="text-xl font-bold text-gray-900"></p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4">

            <a href="shop.html"
               class="flex-1 bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition text-center">
                Continue Shopping
            </a>

            <a href="index.html"
               class="flex-1 border border-gray-300 py-3 rounded-lg hover:bg-gray-100 transition text-center">
                Home
            </a>

        </div>

    </div>

    <script>
        // Display the saved order number if available
        const orderNumber = localStorage.getItem("orderNumber");

        if (orderNumber) {
            document.getElementById("orderNumber").textContent = orderNumber;
        } else {
            document.getElementById("orderNumber").textContent = "#" + Math.floor(Math.random() * 900000 + 100000);
        }
    </script>
    <script src="cart.js"></script>
    <script src="checkout.js"></script>

</body>
</html>
